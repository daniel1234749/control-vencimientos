<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control de Vencimientos</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #222222;
            --border: #2e2e2e;
            --text: #e8e8e8;
            --text-muted: #666;
            --green: #00ff88;
            --green-dim: #00ff8820;
            --red: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 24px;
            color: var(--green);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .logo p {
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            font-family: 'IBM Plex Sans', sans-serif;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--green);
            background: var(--bg);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #00cc70;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            font-family: 'IBM Plex Mono', monospace;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .footer p {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle button {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle button:hover {
            color: var(--green);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔒 CONTROL STOCK</h1>
            <p>Sistema de Vencimientos</p>
        </div>

        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input 
                    type="text" 
                    id="usuario" 
                    placeholder="Ingresa tu usuario"
                    autocomplete="username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-toggle">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" onclick="togglePassword()" title="Mostrar/Ocultar contraseña">
                        👁️
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                🔐 INGRESAR
            </button>

            <div id="errorMessage" class="error-message">
                ❌ Usuario o contraseña incorrectos
            </div>
        </form>

        <div class="footer">
            <p>© 2026 Control de Vencimientos · Seguro y Confiable</p>
        </div>
    </div>

    <script>
        // Base de datos de usuarios (en producción esto iría en el servidor)
        const USUARIOS = {
            'admin': {
                password: 'admin123',
                rol: 'admin',
                nombre: 'Administrador',
                sucursal: null
            },
            'fair': {
                password: 'fair2024',
                rol: 'repositor',
                nombre: 'Repositor Fair',
                sucursal: 'Fair'
            },
            'burzaco': {
                password: 'burzaco2024',
                rol: 'repositor',
                nombre: 'Repositor Burzaco',
                sucursal: 'Burzaco'
            },
            'korn': {
                password: 'korn2024',
                rol: 'repositor',
                nombre: 'Repositor A.Korn',
                sucursal: 'A.Korn'
            },
            'tucuman': {
                password: 'tucuman2024',
                rol: 'repositor',
                nombre: 'Repositor Tucumán',
                sucursal: 'Tucumán'
            },
            'cd': {
                password: 'cd2024',
                rol: 'repositor',
                nombre: 'Repositor CD',
                sucursal: 'Centro de Distribución'
            }
        };

        function login(event) {
            event.preventDefault();
            
            const usuario = document.getElementById('usuario').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // Validar credenciales
            if (USUARIOS[usuario] && USUARIOS[usuario].password === password) {
                // Login exitoso
                const userData = {
                    usuario: usuario,
                    rol: USUARIOS[usuario].rol,
                    nombre: USUARIOS[usuario].nombre,
                    sucursal: USUARIOS[usuario].sucursal,
                    loginTime: new Date().toISOString()
                };

                // Guardar sesión en localStorage
                localStorage.setItem('session', JSON.stringify(userData));

                // Redirigir a index
                window.location.href = 'index.html';
            } else {
                // Login fallido
                errorMsg.classList.add('show');
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);

                // Limpiar password
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const btn = event.target;
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // Si ya hay sesión activa, redirigir
        window.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('session');
            if (session) {
                window.location.href = '02-index.html';
            }
        });

        // Permitir Enter para submit
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
